<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", Arial, sans-serif; background: #0f0f0f; color: #e8e8e8; width: 370px; padding: 12px; direction: rtl; }

    /* ── Header ── */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-logo { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
    #server-chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
    #btn-restart { flex:none; background:none; border:1px solid #333; color:#666; font-size:11px; padding:3px 7px; border-radius:6px; cursor:pointer; width:auto; }
    #btn-restart:hover { border-color:#555; color:#aaa; }
    .chip-ok      { background:#0d2218; color:#4ade80; border:1px solid #166534; }
    .chip-err     { background:#1e0a0a; color:#f87171; border:1px solid #7f1d1d; }
    .chip-loading { background:#1a1a2e; color:#93c5fd; border:1px solid #1e3a5f; }

    /* ── Cards ── */
    .card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:12px; margin-bottom:10px; }

    /* ── Page card ── */
    .url-text { font-size:11px; color:#555; word-break:break-all; margin-bottom:5px; max-height:32px; overflow:hidden; }
    .detected  { font-size:12px; margin-bottom:10px; }
    .btn-row   { display:flex; gap:6px; }
    button { flex:1; padding:9px 6px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
    button:disabled { opacity:0.3; cursor:default; }
    #btn-transcribe { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; }
    #btn-dl-mp3 { background:#1e3a5f; color:#93c5fd; border:1px solid #1d4ed8; font-size:11px; }
    #btn-dl-mp4 { background:#1a2e1a; color:#86efac; border:1px solid #166534; font-size:11px; }
    #btn-record { background:linear-gradient(135deg,#dc2626,#b91c1c); color:#fff; }
    #btn-record.recording { background:linear-gradient(135deg,#7f1d1d,#450a0a); color:#fca5a5; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
    button:hover:not(:disabled) { opacity:0.85; }

    /* ── Jobs list ── */
    #jobs-section { max-height: 420px; overflow-y: auto; }
    #jobs-section::-webkit-scrollbar { width: 4px; }
    #jobs-section::-webkit-scrollbar-track { background: #111; }
    #jobs-section::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* ── Job card ── */
    .job-card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:12px; margin-bottom:8px; }
    .job-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:8px; }
    .job-title { font-size:12px; color:#93c5fd; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }

    .progress-bar-wrap { background:#222; border-radius:6px; height:7px; margin-bottom:5px; overflow:hidden; }
    .progress-bar-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#6366f1,#a78bfa); transition:width 0.5s ease; }
    .progress-row { display:flex; justify-content:space-between; font-size:11px; color:#777; margin-bottom:8px; }

    .steps { display:flex; gap:4px; flex-wrap:wrap; }
    .step { display:flex; align-items:center; gap:4px; font-size:11px; padding:4px 8px; border-radius:5px; background:#111; border:1px solid #222; white-space:nowrap; }
    .step-icon { font-size:12px; }
    .step.active { background:#0d1a2e; border-color:#1d4ed8; color:#93c5fd; }
    .step.done   { background:#0d2218; border-color:#166534; color:#4ade80; }
    .step.err    { background:#1e0a0a; border-color:#7f1d1d; color:#f87171; }
    .step.cancel { background:#1a1000; border-color:#713f12; color:#fbbf24; }

    .job-result { background:#0d2218; border:1px solid #166534; border-radius:7px; padding:8px; margin-top:8px; font-size:11px; color:#4ade80; line-height:1.5; }
    .job-error  { background:#1e0a0a; border:1px solid #7f1d1d; border-radius:7px; padding:8px; margin-top:8px; font-size:11px; color:#f87171; word-break:break-word; }
    .job-cancelled { background:#1a1000; border:1px solid #713f12; border-radius:7px; padding:8px; margin-top:8px; font-size:11px; color:#fbbf24; }

    .job-actions { display:flex; gap:6px; margin-top:8px; }
    .btn-cancel { background:#3f1111; color:#f87171; border:1px solid #7f1d1d; font-size:11px; padding:5px 10px; border-radius:6px; cursor:pointer; flex:none; }
    .btn-cancel:hover { opacity:0.8; }
    .btn-clear  { background:#1e1e1e; color:#666; border:1px solid #333; font-size:11px; padding:5px 10px; border-radius:6px; cursor:pointer; flex:none; }
    .btn-clear:hover { opacity:0.8; }

    .spinner { display:inline-block; width:10px; height:10px; border:2px solid #333; border-top-color:#93c5fd; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .no-jobs { font-size:12px; color:#444; text-align:center; padding:16px 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="icons/icon48.png" class="header-logo" onerror="this.style.display='none'" />
      <h1>תמלולים</h1>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span id="server-chip" class="chip-loading">בודק...</span>
      <button id="btn-restart" title="אתחל שרת">↺</button>
    </div>
  </div>

  <!-- Current page -->
  <div class="card" id="page-card">
    <div class="url-text" id="page-url">טוען...</div>
    <div class="detected" id="detected-label">🔍 בודק...</div>
    <div class="btn-row">
      <button id="btn-transcribe" disabled>🎙️ תמלל</button>
      <button id="btn-dl-mp3" disabled>⬇️ MP3</button>
      <button id="btn-dl-mp4" disabled>⬇️ MP4</button>
    </div>
  </div>

  <!-- Zoom Recording -->
  <div class="card">
    <div class="btn-row">
      <button id="btn-record">⏺️ הקלט זום</button>
    </div>
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:5px;">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#777;">
        <input type="checkbox" id="chk-keep-audio" style="accent-color:#6366f1;cursor:pointer;" />
        <label for="chk-keep-audio" style="cursor:pointer;">שמור הקלטה כ-MP3</label>
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#777;">
        <input type="checkbox" id="chk-save-video" style="accent-color:#dc2626;cursor:pointer;" />
        <label for="chk-save-video" style="cursor:pointer;">הקלט סרטון MP4 (זום יכול להיות מאחורה)</label>
      </div>
    </div>
  </div>

  <!-- Active & recent jobs -->
  <div id="jobs-section"></div>

  <script src="popup.js"></script>
</body>
</html>
